<!-- Modal component: Generic modal wrapper -->
<div class="modal-overlay" id="{{modalId}}">
  <div class="modal-card {{modalClass}}">
    <div class="modal-header">
      <h2>{{modalTitle}}</h2>
      <button class="modal-close" id="{{modalCloseId}}" aria-label="关闭"><i data-lucide="x" size="16"></i></button>
    </div>
    <div class="modal-body">
      {{modalBody}}
    </div>
    <div class="modal-footer">
      {{modalFooter}}
    </div>
  </div>
</div>
