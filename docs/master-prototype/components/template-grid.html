<!-- Template Grid: 3-column template picker -->
<div class="template-divider">{{dividerText}}</div>
<div class="template-grid" id="{{templateGridId}}">
  {{templateCards}}
</div>
<div class="preview-panel" id="{{previewId}}">
  <div class="p-title">模板预览 <span class="highlight" id="{{previewNameId}}"></span></div>
  <div class="preview-empty" id="{{previewEmptyId}}">未选择模板</div>
  <ul class="preview-list" id="{{previewListId}}" style="display:none"></ul>
</div>
