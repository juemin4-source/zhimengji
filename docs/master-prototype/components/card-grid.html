<!-- Card Grid component: Project card grid -->
<div class="card-grid" id="{{gridId}}">
  {{cardItems}}
</div>
<div class="empty-state" id="{{emptyId}}">
  <div class="empty-title">{{emptyTitle}}</div>
  <div class="empty-sub">{{emptySub}}</div>
  <div class="empty-actions">
    <button class="btn btn-primary" id="{{emptyBtnId}}">{{emptyBtnText}}</button>
  </div>
</div>
