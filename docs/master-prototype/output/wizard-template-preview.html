<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>模板预览 — 织梦机 v2.0</title><link rel="stylesheet" href="prototype.css"><script src="https://unpkg.com/lucide@latest"></script></head><body><div class="app" id="app"><nav class="topnav"><div class="topnav-logo">织梦机 Zhimengji</div><div class="topnav-tabs"><button class="topnav-tab active">第一批</button><button class="topnav-tab">文档</button><button class="topnav-tab">画板</button><button class="topnav-tab">设定集</button><button class="topnav-tab">AI</button></div><div class="topnav-right"><button class="topnav-icon-btn" aria-label="搜索" title="搜索"><i data-lucide="search" size="16"></i></button><button class="topnav-icon-btn" aria-label="设置" title="设置"><i data-lucide="settings" size="16"></i></button></div></nav><div class="page-header"><h1 class="page-title">模板预览</h1><div class="page-actions"><button class="btn btn-primary" id="newBtn"><span>+</span> 新建</button></div></div><div class="statsbar"><span>共 <span class="num">4</span> 部作品</span><span>|</span><span>总字数 <span class="num">53,917</span> 字</span><span>|</span><span>最高正典对象 <span class="num highlight">5</span> 个</span></div><div class="card-grid" id="cardGrid"><div class="card" data-title="觉醒纪元" data-genre="科幻" data-status="草稿中" data-words="12430"><div class="card-gradient grad-sci-fi"></div><button class="cover-edit-btn" aria-label="换封面色"><i data-lucide="pencil" size="16"></i></button><button class="menu-toggle" aria-label="更多操作"><i data-lucide="more-vertical" size="16"></i></button><div class="card-menu"><button class="card-menu-item" data-action="rename"><i data-lucide="pen" size="16"></i> 编辑作品名</button><button class="card-menu-item" data-action="genre"><i data-lucide="scissors" size="16"></i> 更改体裁</button><button class="card-menu-item" data-action="cover"><i data-lucide="palette" size="16"></i> 换封面色</button><button class="card-menu-item danger" data-action="delete"><i data-lucide="trash-2" size="16"></i> 删除作品</button><button class="card-menu-item" data-action="export"><i data-lucide="download" size="16"></i> 导出</button></div><div class="card-content"><div class="card-title">觉醒纪元</div><div class="card-meta"><span class="genre-badge">科幻</span><span class="status-indicator"><span class="status-dot draft"></span> 草稿中</span></div><div class="card-wordcount"><strong>12,430</strong> 字</div></div></div></div><div class="empty-state" id="emptyState"><div class="empty-title">没有匹配结果</div><div class="empty-sub">试试其他条件</div><div class="empty-actions"><button class="btn btn-primary" id="emptyCreateBtn">+ 创建第一个作品</button></div></div><div class="statusbar"><div class="status-left"><span><span class="conn-dot" id="connDot"></span> <span id="connLabel">已连接</span></span></div><div class="status-right"><span>织梦机 v2.0</span><span>|</span><span>模板预览</span></div></div></div><div class="modal-overlay" id="wizardOverlay"><div class="modal-card"><div class="modal-header"><h2>新建作品</h2><button class="modal-close" id="wizardClose" aria-label="关闭"><i data-lucide="x" size="16"></i></button></div><div class="modal-body"><div class="form-group"><label for="projectName">作品名</label><input type="text" class="input-field" id="projectName" placeholder="输入作品名称..." autofocus maxlength="40"><div class="validation-hint" id="nameHint">至少 1 个字符</div></div><div class="form-group"><label for="genreSelect">体裁</label><div class="select-wrapper"><select class="select-field" id="genreSelect"><option>科幻</option><option>奇幻</option><option>武侠</option><option>悬疑</option><option selected>其他</option></select></div></div><div class="template-divider">或选择初始模板</div><div class="template-grid"><div class="template-card" data-template="blank"><span class="check-mark"><i data-lucide="check" size="12"></i></span><div class="icon"><i data-lucide="sprout" size="16"></i></div><div class="tname">从零开始</div><div class="tdesc">一步步搭建你的世界</div></div><div class="template-card" data-template="quick"><span class="check-mark"><i data-lucide="check" size="12"></i></span><div class="icon"><i data-lucide="pencil" size="16"></i></div><div class="tname">快速起稿</div><div class="tdesc">预设分类和标签</div></div><div class="template-card" data-template="empty"><span class="check-mark"><i data-lucide="check" size="12"></i></span><div class="icon"><i data-lucide="square" size="16"></i></div><div class="tname">空白画布</div><div class="tdesc">完全自由创作</div></div></div><div class="hint-area"><kbd>Ctrl</kbd> + click 跳过向导</div><div class="modal-footer"><button class="btn btn-secondary" id="wizardCancel">取消</button><button class="btn btn-primary" id="createBtn" disabled>开始创作</button></div></div></div></div><div class="toast" id="toast"></div><script>lucide.createIcons();</script></body></html>
