:root {

  --danger: #f44336; --danger-soft: rgba(244,67,54,0.15);

  --font-mono: "JetBrains Mono","Fira Code",Consolas,monospace;

  --shadow-modal: 0 25px 60px rgba(0,0,0,0.6);
  --nav-height: 44px; --status-bar-height: 28px; --toolbar-height: 40px;
  --sidebar-width: 220px; --inspector-width: 280px;
  --tool-panel-width: 48px; --object-pool-width: 220px;
  --transition-fast: 0.12s ease; --transition-base: 0.18s ease;
  --transition-normal: 0.25s ease; --transition-slow: 0.35s ease;
  --transition-modal: 0.30s cubic-bezier(0.22,1,0.36,1);

  --z-base: 0; --z-dropdown: 100; --z-sticky: 200;
  --z-modal-backdrop: 300; --z-modal: 310; --z-toast: 400; --z-tooltip: 500;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font-sans);font-size:var(--fs-base);line-height:var(--lh-base);color:var(--text-primary);background:var(--bg-canvas);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:var(--radius-full)}
::selection{background:rgba(183,255,0,0.20)}
button,input,textarea,select{font-family:var(--font-sans);outline:none}
a{color:var(--accent);text-decoration:none;transition:color var(--transition-fast)}

.app{width:100%;max-width:1200px;margin:0 auto;padding:0 1.5rem 2rem}
.app-shell{display:flex;flex-direction:column;height:100vh;width:100vw}
.prototype-banner{height:24px;background:var(--bg-banner);border-bottom:1px solid #333300;display:flex;align-items:center;justify-content:center;gap:var(--space-2);font-size:var(--fs-xs);color:var(--accent);flex-shrink:0;letter-spacing:.5px}

/* Top Navigation */
.topnav{display:flex;align-items:center;gap:1rem;padding:.65rem 0;border-bottom:1px solid var(--border-default);flex-wrap:wrap}
.topnav-logo{display:flex;align-items:center;gap:.5rem;font-weight:var(--fw-bold);font-size:1rem;background:linear-gradient(135deg,var(--accent),#d4ff5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.04em;flex-shrink:0}
.topnav-tabs{display:flex;gap:.15rem;flex:1;min-width:0}
.topnav-tab{background:transparent;border:none;color:var(--text-muted);font:var(--fw-medium).8rem/1 inherit;padding:.35rem .85rem;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition-fast);white-space:nowrap}
.topnav-tab:hover{color:var(--text-secondary);background:var(--bg-raised)}
.topnav-tab.active{color:var(--accent);background:var(--accent-soft)}
.topnav-right{display:flex;align-items:center;gap:.5rem;margin-left:auto;flex-shrink:0}
.topnav-icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition-fast)}
.topnav-icon-btn:hover{border-color:#444;color:var(--text-primary);background:rgba(255,255,255,.03)}

.nav-bar{height:var(--nav-height);background:var(--bg-header);border-bottom:1px solid var(--border-default);display:flex;align-items:center;padding:0 var(--space-4);gap:var(--space-3);flex-shrink:0;user-select:none;position:relative;z-index:var(--z-sticky)}
.nav-back{display:flex;align-items:center;gap:var(--space-1);color:var(--text-secondary);font-size:var(--fs-sm);cursor:pointer;padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);transition:all var(--transition-fast);border:none;background:transparent;font-family:var(--font-sans)}
.nav-back:hover{color:var(--text-primary);background:var(--bg-raised)}
.nav-divider{width:1px;height:20px;background:var(--border-default);flex-shrink:0}
.nav-project-name{font-size:var(--fs-sm);font-weight:var(--fw-semibold);flex-shrink:0}
.nav-spacer{flex:1}
.nav-mode-group{display:flex;gap:0;background:var(--bg-surface);border-radius:var(--radius-md);padding:2px;border:1px solid var(--border-default);margin-left:auto}
.nav-mode-btn{padding:3px 14px;font-size:var(--fs-xs);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:var(--radius-sm);transition:all var(--transition-fast);letter-spacing:.02em;font-family:var(--font-sans);font-weight:var(--fw-medium)}
.nav-mode-btn:hover{color:var(--text-primary);background:var(--bg-raised)}
.nav-mode-btn.active{background:var(--accent-soft);color:var(--accent)}
.nav-actions{display:flex;align-items:center;gap:var(--space-1);margin-left:var(--space-2)}
.nav-icon-btn-sm{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all var(--transition-fast);font-size:1rem}
.nav-icon-btn-sm:hover{background:var(--bg-raised);color:var(--text-primary)}

/* Page Header */
.page-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 .75rem;flex-wrap:wrap;gap:.75rem}
.page-title{font-size:var(--fs-xl);font-weight:var(--fw-bold);letter-spacing:.02em}
.page-actions{display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);padding:6px 16px;font-size:var(--fs-sm);font-weight:var(--fw-medium);font-family:var(--font-sans);line-height:1.4;border-radius:var(--radius-md);border:1px solid transparent;cursor:pointer;transition:all var(--transition-fast);user-select:none;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--accent);color:var(--text-on-accent);border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);box-shadow:var(--shadow-glow-accent)}
.btn-primary:disabled{background:var(--accent-disabled);color:rgba(10,10,10,0.35);cursor:not-allowed}
.btn-secondary{background:transparent;color:var(--text-primary);border-color:var(--border-default)}
.btn-secondary:hover{background:var(--bg-raised);border-color:var(--border-light)}
.btn-ghost{background:transparent;color:var(--text-secondary);border-color:transparent}
.btn-ghost:hover{background:var(--bg-raised);color:var(--text-primary)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#e53935}
.btn-link{background:none;border:none;color:var(--text-muted);font-size:var(--fs-sm);cursor:pointer;text-decoration:underline;text-underline-offset:3px;transition:var(--transition-fast);font-family:inherit}
.btn-link:hover{color:var(--accent)}
.btn-sm{padding:3px 10px;font-size:var(--fs-xs);border-radius:var(--radius-sm)}
.btn-lg{padding:9px 24px;font-size:var(--fs-base)}
.btn-icon{width:30px;height:30px;padding:0}

/* Select Wrap */
.select-wrap{position:relative;display:inline-flex;align-items:center}
.select-wrap select{appearance:none;-webkit-appearance:none;background:var(--bg-header);color:var(--text-secondary);padding:.45rem 1.75rem .45rem .75rem;border:1px solid var(--border-default);border-radius:var(--radius-sm);font-size:var(--fs-sm);font-family:inherit;cursor:pointer;transition:var(--transition-fast);min-width:7rem}
.select-wrap select:hover{border-color:#444;color:var(--text-primary)}

/* Filter Bar */
.filterbar{display:flex;align-items:center;gap:.65rem;padding:.75rem 0;flex-wrap:wrap;border-bottom:1px solid var(--border-subtle)}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}

.search-wrap input{width:100%;background:var(--bg-header);color:var(--text-primary);border:1px solid var(--border-default);border-radius:var(--radius-sm);padding:.5rem .75rem .5rem 2.1rem;font-size:var(--fs-sm);font-family:inherit;transition:var(--transition-fast)}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:var(--shadow-focus)}

/* Stats Bar */
.statsbar{display:flex;align-items:center;gap:1.25rem;padding:.6rem 0;font-size:var(--fs-sm);color:var(--text-muted);border-bottom:1px solid var(--border-subtle);flex-wrap:wrap}
.statsbar span{display:inline-flex;align-items:center;gap:.3rem}
.statsbar .num{color:var(--text-secondary);font-weight:var(--fw-medium)}
.statsbar .highlight{color:var(--accent)}

/* Card Grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;padding:1.5rem 0}
.card{position:relative;border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:transform var(--transition-normal),box-shadow var(--transition-normal);box-shadow:var(--shadow-card);background:var(--bg-surface);border:1px solid var(--border-default);aspect-ratio:3/4;display:flex;flex-direction:column;justify-content:flex-end}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-card-hover);border-color:#333}
.card-gradient{position:absolute;inset:0;z-index:0;background-size:200% 200%;background-position:0 50%}
.card:hover .card-gradient{animation:gradientShift 5s ease-in-out infinite}
@keyframes gradientShift{0%{background-position:0 50%}25%{background-position:100% 50%}50%{background-position:100% 100%}75%{background-position:0 100%}100%{background-position:0 50%}}
.card-gradient::before{content:'';position:absolute;inset:0;z-index:1}
.card-content{position:relative;z-index:2;padding:1.5rem 1.25rem 1.25rem;background:linear-gradient(transparent 20%,rgba(0,0,0,.7) 60%,rgba(0,0,0,.88) 100%);display:flex;flex-direction:column;gap:.4rem;min-height:55%;justify-content:flex-end}
.card-title{font-size:1.2rem;font-weight:var(--fw-bold);color:#fff;letter-spacing:.04em;text-shadow:0 1px 6px rgba(0,0,0,.4);line-height:1.3}
.card-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.15rem}
.genre-badge{font-size:.7rem;padding:.15rem .55rem;border-radius:20px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);backdrop-filter:blur(4px);font-weight:var(--fw-medium);letter-spacing:.03em;border:1px solid rgba(255,255,255,.08)}
.status-indicator{display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;color:rgba(255,255,255,.7)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.card-wordcount{font-size:var(--fs-sm);color:rgba(255,255,255,.55)}
.card-wordcount strong{color:#fff;font-weight:600}

/* Canon Dots */
.canon-dots{position:absolute;top:1rem;right:3rem;display:flex;gap:5px;z-index:3}
.canon-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.25);transition:var(--transition-fast)}
.canon-dot.core{background:var(--canon-core);border-color:var(--canon-core)}
.canon-dot.project{background:var(--canon-project);border-color:var(--canon-project)}
.canon-dot.draft{background:var(--canon-draft);border-color:var(--canon-draft)}
.canon-dot.none{background:var(--canon-none);border-color:var(--canon-none)}

.grad-sci-fi{background:linear-gradient(145deg,#1a1a3e,#0d0d2b,#16213e,#0f3460,#1a1a3e)}
.grad-fantasy{background:linear-gradient(145deg,#1a2e1a,#0f1f0f,#1e3a1e,#2a4a1a,#1a2e1a)}
.grad-wuxia{background:linear-gradient(145deg,#2e1a1a,#1f0f0f,#3e1e1a,#4a2a1a,#2e1a1a)}
.grad-mystery{background:linear-gradient(145deg,#1a1a2e,#0d0d1f,#2a1a3e,#1f0f2e,#1a1a2e)}

.cover-edit-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)scale(.85);z-index:5;width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);background:rgba(0,0,0,.45);color:var(--accent);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--transition-normal),transform var(--transition-normal);backdrop-filter:blur(4px);pointer-events:none}
.card:hover .cover-edit-btn{opacity:1;pointer-events:auto;transform:translate(-50%,-50%)scale(1)}

.menu-toggle{position:absolute;top:.75rem;right:.75rem;z-index:4;width:28px;height:28px;border-radius:var(--radius-sm);border:none;background:rgba(0,0,0,.35);color:rgba(255,255,255,.6);font-size:1.15rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--transition-fast);backdrop-filter:blur(4px)}
.card:hover .menu-toggle{opacity:1}
.menu-toggle.active{opacity:1;background:rgba(0,0,0,.55);color:var(--accent)}
.card-menu{position:absolute;top:2.75rem;right:.75rem;z-index:20;background:var(--bg-raised);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:.35rem 0;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;pointer-events:none;transform:translateY(-6px)scale(.95);transition:var(--transition-fast);transform-origin:top right}
.card-menu.open{opacity:1;pointer-events:auto;transform:translateY(0)scale(1)}
.card-menu-item{display:flex;align-items:center;gap:.5rem;padding:.45rem 1rem;font-size:var(--fs-sm);color:var(--text-secondary);cursor:pointer;transition:var(--transition-fast);border:none;background:none;width:100%;text-align:left;font-family:inherit}
.card-menu-item:hover{background:rgba(255,255,255,.05);color:var(--text-primary)}
.card-menu-item.danger{color:var(--danger)}

/* Empty State */
.empty-state{display:none;flex-direction:column;align-items:center;text-align:center;padding:3rem 2rem;gap:1rem}
.empty-state.visible{display:flex}
.empty-title{font-size:1.2rem;font-weight:600;color:var(--text-secondary)}
.empty-sub{font-size:.875rem;color:var(--text-muted);max-width:360px}
.empty-actions{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;margin-top:.5rem}/* Status Bar */
.statusbar{display:flex;align-items:center;gap:1rem;padding:.6rem 0;border-top:1px solid var(--border-subtle);margin-top:.5rem;font-size:.75rem;color:var(--text-muted);flex-wrap:wrap}
.statusbar .conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--safe);box-shadow:0 0 4px var(--safe)}
.statusbar .status-left{display:flex;align-items:center;gap:.5rem}
.statusbar .status-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.statusbar .token-bar{display:inline-flex;align-items:center;gap:.35rem;background:var(--bg-raised);border-radius:4px;padding:.15rem .5rem}
.statusbar .token-fill{width:40px;height:4px;background:var(--bg-surface);border-radius:2px;overflow:hidden}
.statusbar .token-fill span{display:block;height:100%;background:var(--accent);border-radius:2px}
.status-bar{height:var(--status-bar-height);background:var(--bg-header);border-top:1px solid var(--border-default);display:flex;align-items:center;padding:0 var(--space-4);gap:var(--space-4);flex-shrink:0;font-size:var(--fs-xs);color:var(--text-muted);user-select:none}
.save-indicator{display:flex;align-items:center;gap:4px}
.save-indicator.saved{color:#4ade80}
.save-indicator.saving{color:var(--accent)}
.save-indicator.unsaved{color:#fbbf24}

/* Forms */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.8rem;font-weight:var(--fw-medium);color:var(--text-secondary);margin-bottom:6px}
.input-field{width:100%;padding:10px 14px;font-family:inherit;font-size:.9rem;background:var(--bg-canvas);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);outline:none;transition:border-color var(--transition-fast),box-shadow var(--transition-fast)}
.input-field:focus{border-color:var(--accent);box-shadow:var(--shadow-focus)}
.select-wrapper{position:relative}
.select-field{width:100%;padding:10px 36px 10px 14px;font-family:inherit;font-size:.9rem;background:var(--bg-canvas);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);outline:none;cursor:pointer;appearance:none;transition:border-color var(--transition-fast),box-shadow var(--transition-fast)}
.select-field:focus{border-color:var(--accent);box-shadow:var(--shadow-focus)}
.validation-hint{font-size:.7rem;color:#666;margin-top:4px}
.validation-hint.error{color:#ff6b6b}

/* Template Grid */
.template-divider{display:flex;align-items:center;gap:12px;margin:22px 0 14px;font-size:.75rem;color:var(--text-secondary);letter-spacing:.04em}
.template-divider::before,.template-divider::after{content:'';flex:1;height:1px;background:var(--border-default)}
.template-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.template-card{background:var(--bg-raised);border:1.5px solid var(--border-default);border-radius:var(--radius-md);padding:14px 12px;cursor:pointer;transition:all var(--transition-fast);text-align:center;position:relative;overflow:hidden}
.template-card:hover{border-color:#444;background:#222}
.template-card.selected{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-1px)}
.template-card .icon{font-size:1.6rem;margin-bottom:6px;line-height:1.2}
.template-card .tname{font-size:.78rem;font-weight:600;margin-bottom:2px}
.template-card .tdesc{font-size:.65rem;color:var(--text-secondary);line-height:1.4}
.template-card .check-mark{position:absolute;top:6px;right:6px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#0a0a0a;font-size:.55rem;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.5);transition:var(--transition-fast)}
.template-card.selected .check-mark{opacity:1;transform:scale(1)}

/* Preview Panel */
.preview-panel{background:var(--bg-raised);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:18px;min-height:60px;transition:border-color var(--transition-fast)}
.preview-panel.has-template{border-color:var(--accent)}
.preview-panel .p-title{font-size:.75rem;font-weight:var(--fw-medium);color:var(--text-secondary);margin-bottom:8px;letter-spacing:.03em}
.preview-panel .p-title .highlight{color:var(--accent)}
.preview-list{list-style:none;display:flex;flex-wrap:wrap;gap:6px}
.preview-list li{font-size:.75rem;padding:4px 10px;background:rgba(183,255,0,.07);border:1px solid rgba(183,255,0,.15);border-radius:4px;color:var(--text-secondary)}
.preview-empty{font-size:.75rem;color:#555;font-style:italic}
.hint-area{text-align:center;font-size:.7rem;color:#444;margin-bottom:16px;letter-spacing:.02em}
.hint-area kbd{display:inline-block;padding:1px 6px;font-family:inherit;font-size:.65rem;background:var(--bg-raised);border:1px solid var(--border-default);border-radius:3px;color:var(--text-secondary)}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:var(--z-modal-backdrop);background:var(--bg-overlay);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity var(--transition-slow),visibility var(--transition-slow);padding:20px}
.modal-overlay.active{opacity:1;visibility:visible}
.modal-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-modal);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(40px)scale(.97);transition:transform var(--transition-modal)}
.modal-overlay.active .modal-card{transform:translateY(0)scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0;position:sticky;top:0;background:var(--bg-surface);z-index:2}
.modal-header h2{font-size:1.1rem;font-weight:600;letter-spacing:.02em}
.modal-close{width:32px;height:32px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:transparent;color:var(--text-secondary);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition-fast)}
.modal-close:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.modal-body{padding:20px 24px 24px}
.modal-footer{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:4px}

.delete-modal .modal-card{max-width:400px}
.delete-modal .delete-icon{width:48px;height:48px;border-radius:50%;background:rgba(244,67,54,.1);color:var(--danger);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1rem}
.delete-modal .delete-title{text-align:center;font-size:1.05rem;font-weight:600;margin-bottom:.5rem}
.delete-modal .delete-desc{text-align:center;font-size:.85rem;color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.5}
.delete-modal .delete-actions{display:flex;gap:.75rem;justify-content:center}

/* Guide Overlay */
.guide-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease}
.guide-overlay.active{opacity:1;visibility:visible}
.guide-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-modal);max-width:520px;width:100%;padding:2.5rem 2rem;text-align:center;position:relative;transform:translateY(30px);transition:transform var(--transition-modal)}
.guide-overlay.active .guide-card{transform:translateY(0)}
.guide-step-indicator{font-size:.8rem;color:var(--text-muted);margin-bottom:1rem}
.guide-icon{font-size:3rem;margin-bottom:1rem;line-height:1}
.guide-card h2{font-size:1.25rem;font-weight:700;margin-bottom:.75rem}
.guide-card p{font-size:.9rem;color:var(--text-secondary);line-height:1.7}
.guide-dots{display:flex;gap:.4rem;justify-content:center;margin:1.5rem 0}
.guide-dot{width:8px;height:8px;border-radius:50%;background:var(--border-default);transition:var(--transition-fast);cursor:pointer}
.guide-dot.active{background:var(--accent);box-shadow:0 0 6px rgba(183,255,0,.4)}
.guide-actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}

/* Canon Popup */
.canon-backdrop{position:fixed;inset:0;z-index:1500;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease;padding:1rem}
.canon-backdrop.active{opacity:1;visibility:visible}
.canon-popup{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);max-width:480px;width:100%;padding:2rem 1.75rem;box-shadow:0 24px 64px rgba(0,0,0,.5);transform:translateY(32px);transition:transform var(--transition-modal)}
.canon-backdrop.active .canon-popup{transform:translateY(0)}
.canon-popup h2{font-size:1.35rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.canon-intro{color:var(--text-secondary);font-size:.9rem;margin-bottom:1.5rem;line-height:1.7}
.canon-level-row{display:flex;align-items:flex-start;gap:.85rem;padding:.85rem 1rem;border-radius:var(--radius-sm);margin-bottom:.5rem;transition:background .2s;cursor:default}
.canon-level-row:hover{background:var(--bg-raised)}
.canon-level-row .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:.2rem}
.canon-level-row .info{flex:1;min-width:0}
.canon-level-row .info .name{font-weight:600;font-size:.95rem;margin-bottom:.1rem}
.canon-level-row .info .desc{color:var(--text-secondary);font-size:.85rem}
.canon-actions{display:flex;align-items:center;gap:.75rem;margin-top:1.5rem;flex-wrap:wrap}/* Canon Handbook */
.handbook{max-width:780px;margin:0 auto;padding:1rem 0 3rem}
.handbook-nav{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border-default)}
.handbook-nav .back-btn{background:transparent;border:none;color:var(--text-secondary);font:var(--fw-medium).9rem inherit;cursor:pointer;display:flex;align-items:center;gap:.3rem;padding:.3rem .5rem;border-radius:6px;transition:all .2s}
.handbook-nav .back-btn:hover{color:var(--text-primary);background:var(--bg-raised)}
.handbook-nav h1{font-size:1.2rem;font-weight:700;flex:1}
.handbook-notice{background:var(--accent-soft);border:1px solid rgba(183,255,0,.15);border-radius:var(--radius-sm);padding:.6rem 1rem;font-size:.82rem;color:var(--accent);margin-bottom:1rem;line-height:1.5}
.canon-section{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius);margin-bottom:.85rem;overflow:hidden}
.canon-section-header{display:flex;align-items:center;gap:.65rem;padding:.9rem 1.25rem;cursor:pointer;user-select:none;transition:background .2s}
.canon-section-header:hover{background:var(--bg-raised)}
.canon-section-header .section-title{font-weight:700;font-size:1rem;flex:1}
.canon-section-header .section-count{font-size:.8rem;color:var(--text-secondary);background:var(--bg-raised);padding:.15rem .6rem;border-radius:100px}
.canon-section-header .collapse-icon{color:var(--text-secondary);font-size:.7rem;transition:transform .3s}
.canon-section-header .collapse-icon.collapsed{transform:rotate(-90deg)}
.canon-section-body{padding:0 1.25rem 1.25rem}
.canon-section-body.collapsed{display:none}
.canon-section-body .definition{color:var(--text-secondary);font-size:.88rem;margin-bottom:1rem;line-height:1.7}
.object-pill{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .85rem;border-radius:100px;font-size:.85rem;font-weight:var(--fw-medium);background:var(--bg-raised);border:1px solid var(--border-default);cursor:pointer;transition:all .2s;position:relative}
.object-pill::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.object-pill.core{background:var(--canon-core-soft);border-color:rgba(255,183,77,.3)}
.object-pill.project{background:var(--canon-project-soft);border-color:rgba(144,202,249,.3)}
.object-pill.draft{background:var(--canon-draft-soft);border-color:rgba(206,147,216,.3)}
.object-pill.none{background:var(--canon-none-soft);border-color:rgba(102,102,102,.3)}
.object-list{display:flex;flex-wrap:wrap;gap:.5rem}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%)translateY(8px);background:var(--bg-raised);color:var(--text-primary);padding:.65rem 1.25rem;border-radius:8px;font-size:.875rem;border:1px solid var(--border-default);box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:var(--z-toast);opacity:0;transition:opacity .2s ease,transform .2s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%)translateY(0)}

/* Workspace 3-Column */
.body-area{flex:1;display:flex;overflow:hidden;position:relative}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:300px;position:relative}

/* Left Sidebar */
.left-sidebar{width:var(--sidebar-width);min-width:0;background:var(--bg-sidebar);border-right:1px solid var(--border-default);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--transition-normal);overflow:hidden;position:relative;z-index:10}
.left-sidebar.collapsed{width:28px;min-width:28px}
.left-sidebar.collapsed .sidebar-content{display:none}
.collapse-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text-muted);cursor:pointer;flex-shrink:0}
.collapse-btn:hover{color:var(--accent);background:var(--accent-soft);border-radius:var(--radius-sm)}
.sidebar-content{display:flex;flex-direction:column;flex:1;overflow:hidden}
.sidebar-search-area{padding:var(--space-2)var(--space-3);border-bottom:1px solid var(--border-light);display:flex;gap:var(--space-2);align-items:center}
.sidebar-search{flex:1;height:28px;padding:0 var(--space-2);border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-size:var(--fs-xs);outline:none}
.sidebar-search::placeholder{color:var(--text-muted)}
.sidebar-search:focus{border-color:var(--accent)}

.outline-tree{flex:1;overflow-y:auto;padding:var(--space-1)0}
.outline-group{margin-bottom:var(--space-1)}
.outline-group-header{display:flex;align-items:center;gap:var(--space-1);padding:var(--space-1)var(--space-3);font-size:var(--fs-xs);font-weight:var(--fw-semibold);color:var(--text-muted);letter-spacing:.5px;cursor:pointer;user-select:none}
.outline-group-header:hover{color:var(--text-secondary)}
.outline-group-header .arrow{width:16px;text-align:center;transition:transform var(--transition-fast);flex-shrink:0}
.outline-group-header .arrow.collapsed{transform:rotate(-90deg)}
.outline-group-items.collapsed{display:none}
.outline-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-1)var(--space-3)var(--space-1)var(--space-6);font-size:var(--fs-sm);color:var(--text-secondary);cursor:pointer;border-left:2px solid transparent;transition:all var(--transition-fast)}
.outline-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.outline-item.active{border-left-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.outline-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-gold{background:#d4a017}
.dot-blue{background:#4a90d9}
.dot-purple{background:#9b59b6}
.dot-gray{background:#666}
.outline-item .type-tag{font-size:10px;color:var(--text-muted);margin-left:auto}

/* Editor */
.editor-toolbar{display:flex;align-items:center;gap:var(--space-1);padding:var(--space-1)var(--space-3);background:var(--bg-surface);border-bottom:1px solid var(--border-light);flex-wrap:wrap;flex-shrink:0}
.toolbar-group{display:flex;align-items:center;gap:2px;padding:0 var(--space-1);border-right:1px solid var(--border-light)}
.tool-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:var(--fs-sm);transition:all var(--transition-fast)}
.tool-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.tool-btn.active{background:var(--accent-soft);color:var(--accent)}
.mode-group{display:flex;margin-left:auto;border:1px solid var(--border-default);border-radius:var(--radius-sm);overflow:hidden}
.mode-btn{padding:var(--space-1)var(--space-3);font-size:var(--fs-xs);border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all var(--transition-fast)}
.mode-btn:hover{color:var(--text-primary);background:var(--bg-hover)}
.mode-btn.active{color:var(--accent);background:var(--accent-soft)}

.editor-area{flex:1;display:flex;overflow:hidden}
.editor-source{flex:1;padding:var(--space-4);overflow-y:auto}
.editor-source .syntax-hl{white-space:pre-wrap;font-family:var(--font-mono);font-size:var(--fs-sm);line-height:1.8}
.editor-source .syntax-hl .h1{color:#e8e8e8;font-weight:var(--fw-bold);font-size:var(--fs-lg)}
.editor-source .syntax-hl .bold{font-weight:var(--fw-bold);color:#f0f0f0}
.editor-source .syntax-hl .blockquote{color:var(--text-muted);border-left:2px solid var(--accent);padding-left:var(--space-3)}
.editor-source .syntax-hl .code{color:var(--accent);font-family:var(--font-mono)}
.editor-source .syntax-hl .wikilink{color:#4a90d9;cursor:pointer;border-bottom:1px dotted #4a90d9}
.editor-source .syntax-hl .wikilink.missing{color:#d4762a;border-bottom:2px dashed #d4762a}

.editor-preview{display:none;flex:1;padding:var(--space-6);overflow-y:auto}
.editor-preview.show{display:block}
.editor-preview h1{font-size:var(--fs-2xl);font-weight:var(--fw-bold);color:var(--text-heading)}
.editor-preview h2{font-size:var(--fs-xl);font-weight:var(--fw-semibold);color:var(--text-heading)}
.editor-preview blockquote{border-left:3px solid var(--accent);padding:0.3em 1em;color:var(--text-secondary);background:var(--accent-soft);border-radius:0 var(--radius-sm)var(--radius-sm)0}
.editor-preview code{background:var(--bg-raised);padding:2px 6px;border-radius:3px;font-family:var(--font-mono);font-size:.85em;color:var(--accent)}

.editor-richtext{display:none;flex:1;align-items:center;justify-content:center}
.editor-richtext.show{display:flex}
.editor-status{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-1)var(--space-3);background:var(--bg-surface);border-top:1px solid var(--border-light);font-size:11px;color:var(--text-muted);flex-shrink:0}

/* Right Inspector */
.right-inspector{width:var(--inspector-width);background:var(--bg-surface);border-left:1px solid var(--border-default);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.inspector-content{flex:1;overflow-y:auto;padding:var(--space-3);display:flex;flex-direction:column;gap:var(--space-3)}
.project-summary{display:none}
.project-summary.show{display:block}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:var(--space-1)0;font-size:var(--fs-sm)}
.stat-row .stat-label{color:var(--text-secondary)}
.stat-row .stat-value{color:var(--text-heading);font-weight:var(--fw-medium)}
.stat-divider{height:1px;background:var(--border-light);margin:var(--space-1)0}
.object-inspector{display:none}
.object-inspector.show{display:block}

/* Loading / Offline */
.offline-banner{display:none;align-items:center;justify-content:center;gap:var(--space-2);height:28px;background:#c8a200;color:#1a1a00;font-size:var(--fs-xs);font-weight:var(--fw-medium);position:fixed;top:0;left:0;right:0;z-index:1000}
.offline-banner.show{display:flex}
.loading-overlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg-canvas);align-items:center;justify-content:center;flex-direction:column;gap:var(--space-4)}
.loading-overlay.show{display:flex}
.spinner{width:32px;height:32px;border:2px solid var(--border-default);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-bar-fill{height:100%;animation:loadProgress 2s ease-in-out infinite;background:var(--accent)}
@keyframes loadProgress{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:100%;margin-left:0}}

/* Canvas */
.canvas-viewport{flex:1;position:relative;overflow:hidden;background:var(--bg-canvas);cursor:grab}
.canvas-viewport.panning{cursor:grabbing}
.canvas-content{position:absolute;top:0;left:0;width:4000px;height:3000px;transform-origin:0 0;background-color:var(--bg-canvas);background-image:linear-gradient(to right,rgba(20,20,20,0.7)1px,transparent 1px),linear-gradient(to bottom,rgba(20,20,20,0.7)1px,transparent 1px),linear-gradient(to right,rgba(26,26,26,0.8)1px,transparent 1px),linear-gradient(to bottom,rgba(26,26,26,0.8)1px,transparent 1px);background-size:10px 10px,10px 10px,100px 100px,100px 100px;background-position:0 0;will-change:transform}
.node-card{position:absolute;width:170px;background:var(--bg-surface);border-radius:8px;border:2px solid var(--canon-none);padding:0;cursor:pointer;transition:box-shadow .15s,border-color .15s;user-select:none;z-index:2;overflow:hidden}
.node-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.node-card.selected{box-shadow:0 0 0 2px var(--accent),0 4px 20px rgba(0,0,0,0.5)}
.node-card.canon-core{border-color:var(--canon-core)}
.node-card.canon-project{border-color:var(--canon-project)}
.node-card.canon-draft{border-color:var(--canon-draft);border-style:dashed}
.node-card-header{display:flex;align-items:center;gap:8px;padding:10px 12px 6px}
.node-card-name{font-size:.875rem;font-weight:600;color:var(--text-primary);flex:1}

.zoom-controls{position:absolute;bottom:20px;right:20px;display:flex;align-items:center;gap:2px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:8px;padding:3px;z-index:20}
.zoom-btn{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:.9375rem;transition:all .12s;border:none;background:transparent;cursor:pointer}
.zoom-btn:hover{background:var(--bg-raised);color:var(--text-primary)}

.pool-drawer{position:absolute;top:0;right:0;bottom:0;width:var(--object-pool-width);background:var(--bg-surface);border-left:1px solid var(--border-default);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;z-index:15}
.pool-drawer.open{transform:translateX(0)}
.tool-panel{width:var(--tool-panel-width);background:var(--bg-surface);border-right:1px solid var(--border-default);display:flex;flex-direction:column;align-items:center;padding:6px 0;flex-shrink:0;z-index:10}

.timeline-view{flex:1;display:none;position:relative;overflow:hidden;background:var(--bg-canvas)}
.timeline-view.active{display:flex;flex-direction:column}
.timeline-header{padding:16px 24px;text-align:center;border-bottom:1px solid var(--border-default)}
.timeline-track{position:absolute;left:60px;right:60px;top:50%;transform:translateY(-50%);height:4px;background:var(--border-default);border-radius:2px}
.timeline-event-card{position:absolute;width:160px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:8px;padding:12px;cursor:pointer;transition:border-color .15s;user-select:none}
.timeline-event-card .event-date{font-size:.6875rem;color:var(--accent);margin-bottom:2px}
.timeline-event-card .event-name{font-size:.8125rem;font-weight:500;color:var(--text-primary)}
.timeline-sidebar{width:200px;border-left:1px solid var(--border-default);background:var(--bg-surface);flex-shrink:0}/* AI Chat */
.main-row{flex:1;display:flex;flex-direction:row;overflow:hidden;position:relative}
.chat-layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-header{height:40px;background:var(--bg-surface);border-bottom:1px solid var(--border-default);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.chat-header-title{font-size:var(--fs-sm);font-weight:600;color:var(--text-primary);flex-shrink:0}
.chat-header-model{font-size:var(--fs-xs);color:var(--text-muted);display:flex;align-items:center;gap:4px;flex-shrink:0}
.conversation-scroll{flex:1;overflow-y:auto;padding:24px 0}
.conversation-inner{max-width:760px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:20px}
.msg{display:flex;gap:12px;max-width:100%;animation:fadeIn .3s ease}
.msg.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.875rem}
.msg-body{max-width:85%;display:flex;flex-direction:column;gap:4px}
.msg-bubble{padding:10px 14px;border-radius:var(--radius-lg);font-size:.875rem;line-height:1.6}
.msg.user .msg-bubble{background:rgba(66,165,245,.08);border:1px solid rgba(66,165,245,.12);border-top-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--bg-surface);border:1px solid var(--border-default);border-top-left-radius:4px}
.msg-time{font-size:.625rem;color:var(--text-muted);padding:0 4px;margin-top:2px}

.doc-card{margin:12px 0 8px;background:#1a1a1a;border:1px solid var(--border-default);border-radius:var(--radius-lg);border-left:3px solid var(--accent);overflow:hidden;transition:all .2s}
.doc-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.4);transform:translateY(-1px)}
.doc-card-header{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
.doc-card-type{font-size:.625rem;font-weight:600;padding:2px 8px;border-radius:3px;background:var(--accent-soft);color:var(--accent);border:1px solid rgba(183,255,0,.15);letter-spacing:.5px;flex-shrink:0}
.doc-card-title{font-size:.9375rem;font-weight:600;color:var(--text-primary);flex:1}
.doc-card-body{padding:0 16px 10px;font-size:.8125rem;line-height:1.65;color:var(--text-secondary)}
.doc-card-actions{display:flex;gap:6px;padding:8px 16px 12px;border-top:1px solid var(--border-default)}
.doc-card-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:var(--radius-sm);font-size:.75rem;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .12s}
.doc-card-btn:hover{background:var(--bg-raised);color:var(--text-primary)}
.doc-card-btn.primary{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(183,255,0,.15)}

.input-area{flex-shrink:0;border-top:1px solid var(--border-default);background:var(--bg-canvas);padding:12px 24px 16px}
.input-inner{max-width:760px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;position:relative;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);transition:border-color .15s;display:flex;align-items:flex-end}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap textarea{width:100%;padding:10px 12px;background:transparent;border:none;color:var(--text-primary);font-size:.875rem;line-height:1.5;resize:none;max-height:120px;min-height:44px;font-family:var(--font-sans)}
.send-btn{width:44px;height:44px;border-radius:var(--radius-md);border:none;background:var(--accent);color:#0a0a0a;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.125rem;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:var(--accent-hover);box-shadow:0 0 16px rgba(183,255,0,.25);transform:scale(1.05)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}

.bottom-bar{flex-shrink:0;height:28px;background:var(--bg-header);border-top:1px solid var(--border-default);display:flex;align-items:center;padding:0 16px;font-size:.6875rem;color:var(--text-muted);user-select:none}
.bottom-right{margin-left:auto;display:flex;align-items:center;gap:12px}

.sidebar{width:var(--sidebar-width);background:var(--bg-sidebar);border-right:1px solid var(--border-default);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width var(--transition-normal);position:relative;z-index:10}
.sidebar.collapsed{width:0;border-right-color:transparent}

.sidebar-toggle-btn{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .12s;flex-shrink:0}
.sidebar-toggle-btn:hover{background:var(--bg-raised);color:var(--text-primary)}

/* Settings */
.settings-layout{display:flex;flex:1;overflow:hidden}
.settings-sidebar{width:200px;min-width:200px;background:var(--bg-surface);border-right:1px solid var(--border-default);display:flex;flex-direction:column;overflow:hidden}
.settings-content{flex:1;overflow-y:auto;padding:24px 32px}
.settings-title{font-size:1.2rem;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.settings-desc{font-size:var(--fs-sm);color:var(--text-secondary)}
.section{margin-bottom:28px}

.provider-card{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;transition:border-color .15s}
.provider-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.provider-card.expanded .provider-card-body{max-height:300px}
.provider-card-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.provider-card-inner{padding:12px 16px 16px;border-top:1px solid var(--border-default);display:flex;flex-direction:column;gap:12px}

/* Model Selector */
.model-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .12s;border:1px solid transparent}
.model-item:hover{background:var(--accent-soft2);border-color:var(--border-light)}
.model-item.active{background:var(--accent-soft);border-color:rgba(183,255,0,.2)}
.model-name{font-size:.8125rem;font-weight:500;color:var(--text-primary)}
.model-cost{font-size:.6875rem;color:var(--text-muted);white-space:nowrap}

.usage-bar{height:8px;background:var(--bg-raised);border-radius:4px;overflow:hidden}
.usage-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;background:linear-gradient(90deg,var(--safe),var(--warning),var(--danger))}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:var(--space-1);padding:1px 10px;font-size:var(--fs-xs);font-weight:var(--fw-medium);line-height:1.5;border-radius:var(--radius-full);white-space:nowrap}
.badge-accent{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(183,255,0,.15)}
.badge-canon-core{background:var(--canon-core-soft);color:var(--canon-core);border:1px solid rgba(255,183,77,.2)}
.badge-canon-project{background:var(--canon-project-soft);color:var(--canon-project);border:1px solid rgba(144,202,249,.2)}
.badge-canon-draft{background:var(--canon-draft-soft);color:var(--canon-draft);border:1px solid rgba(206,147,216,.2)}
.badge-canon-none{background:var(--canon-none-soft);color:var(--canon-none);border:1px solid rgba(102,102,102,.2)}
.badge-safe{background:var(--safe-soft);color:var(--safe);border:1px solid rgba(76,175,80,.2)}

@media(max-width:600px){
  .app{padding:0 .75rem 1.5rem}
  .page-header{flex-direction:column;align-items:stretch}
  .card-grid{grid-template-columns:1fr;gap:1rem}
  .card{aspect-ratio:auto;min-height:260px}
  .template-grid{grid-template-columns:1fr}
  .modal-card{max-width:100%;border-radius:0;max-height:100vh}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal-card{border-radius:var(--radius-lg)var(--radius-lg)0 0}
  .settings-content{padding:16px}
  .right-inspector{display:none}
}
@media(min-width:601px)and(max-width:900px){
  .card-grid{grid-template-columns:repeat(2,1fr)}
