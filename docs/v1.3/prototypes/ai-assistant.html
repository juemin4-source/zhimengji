<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>织梦机 v1.3 — AI 助手全页对话</title>
<style>
:root {
  --bg-canvas: #0a0a0a;
  --bg-surface: #141414;
  --bg-raised: #1e1e1e;
  --bg-header: #0e0e0e;
  --sidebar-bg: #0e0e0e;
  --sidebar-width: 220px;
  --accent: #B7FF00;
  --accent-hover: #c8ff33;
  --accent-soft: rgba(183, 255, 0, 0.1);
  --accent-soft2: rgba(183, 255, 0, 0.05);
  --border-default: #2a2a2a;
  --border-light: #333;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --text-muted: #666;
  --canon-core: #FFB74D;
  --canon-project: #90CAF9;
  --canon-draft: #CE93D8;
  --danger: #f44336;
  --success: #4CAF50;
  --warning: #FFC107;
  --info: #42A5F5;
  --font-sans: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "JetBrains Mono", Consolas, monospace;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font-sans);font-size:.9375rem;line-height:1.6;color:var(--text-primary);background:var(--bg-canvas);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}
::selection{background:rgba(183,255,0,.2)}
button,input,textarea{font-family:var(--font-sans);outline:none}
.prototype-banner{height:24px;background:#1a1a0e;border-bottom:1px solid #333300;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.6875rem;color:var(--accent);flex-shrink:0;letter-spacing:.5px}
.prototype-banner span{opacity:.7}
.app-shell{display:flex;flex-direction:column;height:100vh}

/* ===== Nav Bar ===== */
.nav-bar{height:44px;background:var(--bg-header);border-bottom:1px solid var(--border-default);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;user-select:none}
.nav-back{display:flex;align-items:center;gap:4px;color:var(--text-secondary);font-size:.8125rem;cursor:pointer;padding:4px 8px;border-radius:var(--radius-sm);transition:all .12s}
.nav-back:hover{color:var(--text-primary);background:var(--bg-raised)}
.nav-back svg{width:16px;height:16px}
.nav-divider{width:1px;height:20px;background:var(--border-default);flex-shrink:0}
.nav-project{font-size:.875rem;font-weight:600;color:var(--text-primary);flex-shrink:0}
.nav-spacer{flex:1}
.nav-modes{display:flex;gap:0;background:var(--bg-surface);border-radius:6px;padding:2px;border:1px solid var(--border-default)}
.nav-mode-btn{padding:3px 14px;font-size:.75rem;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:4px;transition:all .12s;letter-spacing:.3px}
.nav-mode-btn:hover{color:var(--text-primary)}
.nav-mode-btn.active{background:var(--accent-soft);color:var(--accent);box-shadow:0 0 0 1px rgba(183,255,0,.2)}
.nav-actions{display:flex;align-items:center;gap:6px;margin-left:12px}
.nav-icon-btn{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .12s;font-size:1rem}
.nav-icon-btn:hover{background:var(--bg-raised);color:var(--text-primary)}
.nav-icon-btn.active{color:var(--accent);background:var(--accent-soft)}

/* ===== Main Row (sidebar + chat) ===== */
.main-row{flex:1;display:flex;flex-direction:row;overflow:hidden;position:relative}

/* ===== Sidebar ===== */
.sidebar{width:var(--sidebar-width);background:var(--sidebar-bg);border-right:1px solid var(--border-default);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s ease, border-color .25s ease;position:relative;z-index:10}
.sidebar.collapsed{width:0;border-right-color:transparent}

/* Sidebar header */
.sidebar-header{height:40px;display:flex;align-items:center;padding:0 8px 0 12px;gap:8px;border-bottom:1px solid var(--border-default);flex-shrink:0;white-space:nowrap;overflow:hidden}
.sidebar-toggle-btn{width:28px;height:28px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .12s;flex-shrink:0;font-size:1rem}
.sidebar-toggle-btn:hover{background:var(--bg-raised);color:var(--text-primary)}
.sidebar-title{font-size:.8125rem;font-weight:600;color:var(--text-primary);letter-spacing:.5px;text-transform:uppercase}
.sidebar-spacer{flex:1}

/* Sidebar reveal button (shown when collapsed) */
.sidebar-reveal{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:20;width:24px;height:48px;display:none;align-items:center;justify-content:center;border:none;border-radius:0 var(--radius-sm) var(--radius-sm) 0;background:var(--sidebar-bg);border:1px solid var(--border-default);border-left:none;color:var(--text-secondary);cursor:pointer;transition:all .12s;font-size:.875rem}
.sidebar-reveal:hover{background:var(--bg-raised);color:var(--text-primary)}
.main-row .sidebar-reveal{display:none}
.sidebar.collapsed + .main-content .sidebar-reveal,
.main-row:has(.sidebar.collapsed) > .sidebar-reveal{display:flex}

/* Sidebar content area */
.sidebar-content{flex:1;overflow-y:auto;padding:8px 0;white-space:nowrap}
.sidebar-content::-webkit-scrollbar{width:3px}

/* Sidebar sections */
.sidebar-section{margin-bottom:4px}
.sidebar-section-title{padding:6px 16px 4px;font-size:.6875rem;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase}

/* Folder / tree */
.sidebar-folder{}
.sidebar-folder-label{padding:4px 16px 2px 16px;font-size:.75rem;font-weight:600;color:var(--text-secondary);cursor:default;display:flex;align-items:center;gap:4px;user-select:none}
.sidebar-folder-label::before{content:'\25BE';font-size:.625rem;color:var(--text-muted)}

/* Items */
.sidebar-item{display:flex;align-items:center;gap:8px;padding:5px 16px 5px 28px;font-size:.75rem;color:var(--text-secondary);cursor:pointer;transition:all .1s;border-radius:0;user-select:none;position:relative}
.sidebar-item:hover{color:var(--text-primary);background:rgba(255,255,255,.03)}
.sidebar-item.active{color:var(--accent);background:var(--accent-soft)}
.sidebar-item.active::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:2px;background:var(--accent);border-radius:0 1px 1px 0}

/* Canon dots */
.canon-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.canon-core{background:var(--canon-core);box-shadow:0 0 4px rgba(255,183,77,.3)}
.canon-project{background:var(--canon-project);box-shadow:0 0 4px rgba(144,202,249,.25)}
.canon-draft{background:var(--canon-draft);box-shadow:0 0 4px rgba(206,147,216,.2)}
.canon-gray{background:var(--text-muted)}

/* Sidebar model selector (bottom) */
.sidebar-model{border-top:1px solid var(--border-default);padding:8px 12px;flex-shrink:0}
.sidebar-model-select{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--radius-sm);background:var(--bg-raised);border:1px solid var(--border-default);cursor:pointer;transition:all .12s;font-size:.75rem;color:var(--text-secondary);overflow:hidden}
.sidebar-model-select:hover{border-color:var(--border-light);color:var(--text-primary)}
.sidebar-model-select .model-dot{width:5px;height:5px;border-radius:50%;background:var(--success);flex-shrink:0}
.sidebar-model-name{flex:1;overflow:hidden;text-overflow:ellipsis}
.sidebar-model-chevron{flex-shrink:0;font-size:.6875rem;color:var(--text-muted);margin-left:auto}

/* ===== Main Content (right side, wraps chat area) ===== */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ===== Chat Area ===== */
.chat-layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-header{height:40px;background:var(--bg-surface);border-bottom:1px solid var(--border-default);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.chat-header-title{font-size:.8125rem;font-weight:600;color:var(--text-primary);flex-shrink:0}
.chat-header-model{font-size:.6875rem;color:var(--text-muted);display:flex;align-items:center;gap:4px;flex-shrink:0}
.chat-header-model .model-dot{width:5px;height:5px;border-radius:50%;background:var(--success);flex-shrink:0}
.chat-header-spacer{flex:1}
.chat-header-focus{display:none;align-items:center;gap:6px;padding:2px 10px;background:var(--accent-soft2);border:1px solid rgba(183,255,0,.12);border-radius:var(--radius-sm);font-size:.6875rem;color:var(--accent);animation:fadeIn .2s ease}
.chat-header-focus.visible{display:flex}
.chat-header-focus-close{display:flex;align-items:center;justify-content:center;width:16px;height:16px;border:none;background:transparent;color:var(--accent);cursor:pointer;border-radius:50%;font-size:.6rem;opacity:.6;transition:opacity .1s;padding:0}
.chat-header-focus-close:hover{opacity:1;background:rgba(183,255,0,.15)}
.chat-header-actions{display:flex;gap:4px;flex-shrink:0}
.chat-header-btn{font-size:.6875rem;padding:3px 10px;border-radius:var(--radius-sm);border:1px solid var(--border-default);background:var(--bg-raised);color:var(--text-secondary);cursor:pointer;transition:all .12s;white-space:nowrap}
.chat-header-btn:hover{color:var(--text-primary);border-color:var(--border-light)}

/* ===== Conversation Scroll ===== */
.conversation-scroll{flex:1;overflow-y:auto;padding:24px 0}
.conversation-inner{max-width:760px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:20px}

/* ===== Message Bubbles ===== */
.msg{display:flex;gap:12px;max-width:100%;animation:fadeIn .3s ease}
.msg.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.875rem}
.msg.user .msg-avatar{background:rgba(66,165,245,.12);border:1px solid rgba(66,165,245,.18)}
.msg.assistant .msg-avatar{background:rgba(183,255,0,.1);border:1px solid rgba(183,255,0,.15)}
.msg-body{max-width:85%;display:flex;flex-direction:column;gap:4px}
.msg-bubble{padding:10px 14px;border-radius:var(--radius-lg);font-size:.875rem;line-height:1.6}
.msg.user .msg-bubble{background:rgba(66,165,245,.08);border:1px solid rgba(66,165,245,.12);color:var(--text-primary);border-top-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--bg-surface);border:1px solid var(--border-default);color:var(--text-primary);border-top-left-radius:4px}
.msg-bubble p{margin:.3em 0}
.msg-bubble p:first-child{margin-top:0}
.msg-bubble p:last-child{margin-bottom:0}
.msg-time{font-size:.625rem;color:var(--text-muted);padding:0 4px;margin-top:2px}
.msg.user .msg-time{text-align:right}

/* ===== Document card highlight on focus ===== */
.doc-card.highlighted{border-color:var(--accent);box-shadow:0 0 20px rgba(183,255,0,.15),0 4px 20px rgba(0,0,0,.4)}
.doc-card.highlighted .doc-card-header::after{content:'已聚焦';font-size:.625rem;color:var(--accent);background:var(--accent-soft);padding:1px 8px;border-radius:3px;border:1px solid rgba(183,255,0,.15);margin-left:auto;flex-shrink:0}
/* ===== Embedded Document Card ===== */
.doc-card{margin:12px 0 8px;background:#1a1a1a;border:1px solid var(--border-default);border-radius:var(--radius-lg);border-left:3px solid var(--accent);overflow:hidden;transition:all .2s;animation:fadeIn .35s ease}
.doc-card:hover{border-color:#3a3a3a;box-shadow:0 4px 20px rgba(0,0,0,.4);transform:translateY(-1px)}
.doc-card-header{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;cursor:default}
.doc-card-type{font-size:.625rem;font-weight:600;padding:2px 8px;border-radius:3px;background:var(--accent-soft);color:var(--accent);border:1px solid rgba(183,255,0,.15);letter-spacing:.5px;flex-shrink:0}
.doc-card-type.world{background:rgba(183,255,0,.08);color:var(--accent);border-color:rgba(183,255,0,.12)}
.doc-card-type.org{background:rgba(144,202,249,.08);color:var(--info);border-color:rgba(144,202,249,.12)}
.doc-card-title{font-size:.9375rem;font-weight:600;color:var(--text-primary);flex:1}
.doc-card-status{font-size:.625rem;color:var(--text-muted);display:flex;align-items:center;gap:4px;flex-shrink:0}
.doc-card-status .status-pub{color:var(--success)}
.doc-card-body{padding:0 16px 10px;font-size:.8125rem;line-height:1.65;color:var(--text-secondary)}
.doc-card-body p{margin:.35em 0}
.doc-card-body .inline-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.6875rem;background:var(--bg-raised);color:var(--text-muted);border:1px solid var(--border-default)}
.doc-card-actions{display:flex;gap:6px;padding:8px 16px 12px;border-top:1px solid var(--border-default)}
.doc-card-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:var(--radius-sm);font-size:.75rem;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .12s}
.doc-card-btn:hover{background:var(--bg-raised);color:var(--text-primary)}
.doc-card-btn.primary{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(183,255,0,.15)}
.doc-card-btn.primary:hover{background:rgba(183,255,0,.18);border-color:rgba(183,255,0,.3)}
.doc-card-btn svg{width:14px;height:14px}
.doc-card-edited{font-size:.6875rem;color:var(--text-muted);padding:0 16px 12px;border-top:1px solid var(--border-default);margin-top:0;display:flex;align-items:center;gap:6px}
.doc-card-edited .edit-badge{color:var(--accent)}
.doc-card-section{border-top:1px solid var(--border-default);padding:10px 16px}
.doc-card-section-title{font-size:.6875rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}

/* ===== Doc card inline editing ===== */
.doc-card .card-input{width:100%;padding:6px 10px;background:var(--bg-canvas);border:1px solid var(--border-default);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.8125rem;transition:border-color .12s;resize:none;font-family:var(--font-sans)}
.doc-card .card-input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-soft)}

/* ===== Input Bar ===== */
.input-area{flex-shrink:0;border-top:1px solid var(--border-default);background:var(--bg-canvas);padding:12px 24px 16px}
.input-inner{max-width:760px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;position:relative;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);transition:border-color .15s;display:flex;align-items:flex-end}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-soft)}
.input-wrap textarea{width:100%;padding:10px 12px;background:transparent;border:none;color:var(--text-primary);font-size:.875rem;line-height:1.5;resize:none;max-height:120px;min-height:44px;font-family:var(--font-sans)}
.input-wrap textarea::placeholder{color:var(--text-muted)}
.send-btn{width:44px;height:44px;border-radius:var(--radius-md);border:none;background:var(--accent);color:#0a0a0a;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.125rem;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:var(--accent-hover);box-shadow:0 0 16px rgba(183,255,0,.25);transform:scale(1.05)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;transform:none}

/* ===== Bottom Bar ===== */
.bottom-bar{flex-shrink:0;height:28px;background:var(--bg-header);border-top:1px solid var(--border-default);display:flex;align-items:center;padding:0 16px;font-size:.6875rem;color:var(--text-muted);user-select:none}
.bottom-left{display:flex;align-items:center;gap:8px}
.bottom-conn{display:flex;align-items:center;gap:4px}
.bottom-conn-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0;box-shadow:0 0 4px rgba(76,175,80,.5)}
.bottom-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.bottom-sep{color:var(--border-default)}
.bottom-stat{color:var(--text-secondary)}
.bottom-usage{display:flex;align-items:center;gap:6px}
.bottom-usage-track{width:60px;height:3px;background:var(--bg-raised);border-radius:2px;overflow:hidden}
.bottom-usage-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s ease}

/* ===== Typing Indicator ===== */
.typing-indicator{display:none;align-items:center;gap:4px;padding:8px 14px;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);border-top-left-radius:4px;width:64px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:dotPulse 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,60%,100%{opacity:.3;transform:scale(.85)}30%{opacity:1;transform:scale(1)}}

/* ===== Scroll anchor ===== */
.scroll-anchor{height:1px;flex-shrink:0}
</style>

</head>

<div class="prototype-banner"><span>&#9888; 原型演示 v1.3 — AI 助手全页对话 · 文档嵌入式生成</span></div>

  <!-- Nav Bar -->
  <nav class="nav-bar">
    <div class="nav-back" id="backBtn">

    <div class="nav-project">织梦机</div>

              <div class="sidebar-item" data-focus="world-eye-further" data-label="天眼系统 — 技术细节"><span class="canon-dot canon-draft"></span>天眼系统 · 技术细节</div>

            </div>
          </div>

        <!-- Chapters -->
        <div class="sidebar-section">
          <div class="sidebar-section-title"><i data-lucide="file-text" size="16"></i> 章节</div>
          <div class="sidebar-tree">
            <div class="sidebar-item" data-focus="" data-label="第一章 — 静默时刻"><span class="canon-dot canon-gray"></span>第一章 — 静默时刻</div>
            <div class="sidebar-item" data-focus="" data-label="第二章 — 破晓行动"><span class="canon-dot canon-gray"></span>第二章 — 破晓行动</div>
          </div>
        </div>

        <!-- Settings collection -->
        <div class="sidebar-section">
          <div class="sidebar-section-title"><i data-lucide="tag" size="16"></i> 设定集</div>
          <div class="sidebar-tree">
            <div class="sidebar-item" data-focus="" data-label="核心正典"><span class="canon-dot canon-core"></span>核心正典</div>
            <div class="sidebar-item" data-focus="" data-label="草案"><span class="canon-dot canon-draft"></span>草案</div>
          </div>
        </div>
      </div>

      <!-- Bottom: Model selector -->
      <div class="sidebar-model">
        <div class="sidebar-model-select" id="sidebarModelSelect">
          <span class="model-dot"></span>
          <span class="sidebar-model-name">Claude 3.5 Sonnet</span>
          <span class="sidebar-model-chevron"><i data-lucide="chevron-down" size="12"></i></span>
        </div>
      </div>
    </div>

    <!-- Sidebar reveal button (visible when collapsed) -->
    <button class="sidebar-reveal" id="sidebarReveal" title="展开大纲"><i data-lucide="menu" size="16"></i></button>
    <!-- Main Content (chat area) -->
    <div class="main-content">
      <!-- Chat Layout -->
      <div class="chat-layout">
        <!-- Chat Header -->
        <div class="chat-header">
          <span class="chat-header-title">AI 助手</span>
          <span class="chat-header-model"><span class="model-dot"></span> Claude 3.5 Sonnet</span>
          <div class="chat-header-focus" id="focusIndicator">
            <span>聚焦: <span id="focusLabel"></span></span>
            <button class="chat-header-focus-close" id="focusClear" title="清除聚焦"><i data-lucide="x" size="16"></i></button>
          </div>
          <div class="chat-header-spacer"></div>
          <div class="chat-header-actions">
            <button class="chat-header-btn" id="newChatBtn">+ 新对话</button>
            <button class="chat-header-btn" id="modelBtn">切换模型</button>
          </div>
        </div>

        <!-- Conversation Scroll -->
        <div class="conversation-scroll" id="convScroll">
          <div class="conversation-inner" id="convInner">
            <div class="scroll-anchor" id="scrollAnchor"></div>
          </div>
        </div>

        <!-- Input Bar -->
        <div class="input-area">
          <div class="input-inner">
            <div class="input-wrap">
              <textarea id="chatInput" rows="1" placeholder="输入你的想法，让 AI 帮你创作..." autocomplete="off"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="bottom-left">
      <span class="bottom-conn"><span class="bottom-conn-dot"></span>AI 已连接</span>
    </div>
    <div class="bottom-right">
      <span>tokens: <span class="bottom-stat" id="bottomTokens">6.2K</span></span>
      <span class="bottom-sep">|</span>
      <span class="bottom-usage">
        <span>用量</span>
        <span class="bottom-usage-track"><span class="bottom-usage-fill" id="usageFill" style="width:42%"></span></span>
      </span>
    </div>
  </div>
</div>
<script>
(function(){
  var convInner = document.getElementById('convInner');
  var convScroll = document.getElementById('convScroll');
  var chatInput = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var scrollAnchor = document.getElementById('scrollAnchor');
  var bottomTokens = document.getElementById('bottomTokens');
  var usageFill = document.getElementById('usageFill');

  var tokenCount = 6240;
  var maxTokens = 15000;
  var isProcessing = false;

  // ===== Sidebar toggle =====
  var sidebar = document.getElementById('sidebar');
  var sidebarToggle = document.getElementById('sidebarToggle');
  var sidebarReveal = document.getElementById('sidebarReveal');
  var isSidebarCollapsed = false;

  function toggleSidebar() {
    isSidebarCollapsed = !isSidebarCollapsed;
    sidebar.classList.toggle('collapsed', isSidebarCollapsed);
    sidebarToggle.textContent = isSidebarCollapsed ? '▶' : '◀';
    sidebarToggle.title = isSidebarCollapsed ? '展开大纲' : '收起大纲';
  }

  sidebarToggle.addEventListener('click', toggleSidebar);
  sidebarReveal.addEventListener('click', toggleSidebar);

  // ===== Focus system =====
  var focusIndicator = document.getElementById('focusIndicator');
  var focusLabel = document.getElementById('focusLabel');
  var focusClear = document.getElementById('focusClear');
  var currentFocus = null;

  function setFocus(itemEl) {
    document.querySelectorAll('.sidebar-item.active').forEach(function(el) {
      el.classList.remove('active');
    });

    var focusId = itemEl.getAttribute('data-focus');
    var label = itemEl.getAttribute('data-label') || itemEl.textContent.trim();

    if (!focusId) {
      itemEl.classList.add('active');
      focusIndicator.classList.remove('visible');
      currentFocus = null;
      document.querySelectorAll('.doc-card.highlighted').forEach(function(c) {
        c.classList.remove('highlighted');
      });
      return;
    }

    currentFocus = focusId;
    itemEl.classList.add('active');
    focusLabel.textContent = label;
    focusIndicator.classList.add('visible');

    var targetCard = document.querySelector('.doc-card[data-card="' + focusId + '"]');
    document.querySelectorAll('.doc-card.highlighted').forEach(function(c) {
      c.classList.remove('highlighted');
    });
    if (targetCard) {
      targetCard.classList.add('highlighted');
      targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function clearFocus() {
    document.querySelectorAll('.sidebar-item.active').forEach(function(el) {
      el.classList.remove('active');
    });
    document.querySelectorAll('.doc-card.highlighted').forEach(function(c) {
      c.classList.remove('highlighted');
    });
    focusIndicator.classList.remove('visible');
    currentFocus = null;
  }

  document.querySelectorAll('.sidebar-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      if (item.classList.contains('active')) {
        clearFocus();
      } else {
        setFocus(item);
      }
    });
  });

  focusClear.addEventListener('click', clearFocus);

  document.getElementById('sidebarModelSelect').addEventListener('click', function() {
    window.location.href = 'model-selector.html';
  });

  // ===== Document Card HTML Template =====
  function docCardHTML(opts) {
    var typeLabel = opts.type === 'world' ? '世界观' : '组织';
    var typeClass = opts.type;
    var statusText = opts.status || '已收录';
    var sectionsHTML = '';
    if(opts.sections) {
      sectionsHTML = opts.sections.map(function(s) {
        return '<div class="doc-card-section"><div class="doc-card-section-title">' + s.title + '</div><p style="font-size:.8125rem;color:var(--text-secondary)">' + s.content + '</p></div>';
      }).join('');
    }
    return '<div class="doc-card" data-card="' + opts.id + '">' +
      '<div class="doc-card-header">' +
        '<span class="doc-card-type ' + typeClass + '">' + typeLabel + '</span>' +
        '<span class="doc-card-title">' + opts.title + '</span>' +
        '<span class="doc-card-status"><span class="' + statusText + '">' + statusText + '</span></span>' +
      '</div>' +
      '<div class="doc-card-body">' + opts.bodyHTML + '</div>' +
      (opts.sections ? sectionsHTML : '') +
      '<div class="doc-card-actions">' +
        '<button class="doc-card-btn primary" onclick="alert(\'编辑模式 — 此处将打开内联编辑\')"><i data-lucide="pencil" size="16"></i>️ 编辑</button>' +
        '<button class="doc-card-btn" onclick="alert(\'已收录为设定\')"><i data-lucide="pin" size="16"></i> 收录为设定</button>' +
        '<button class="doc-card-btn" onclick="alert(\'展开更多内容\')"><i data-lucide="plus" size="16"></i> 继续展开</button>' +
      '</div>' +
    '</div>';
  }
  // ===== Pre-made conversation data =====
  var convoData = [
    {
      role: 'user',
      time: '10:32 AM',
      content: '帮我创建一篇反乌托邦世界观——中央有个天眼系统监控所有人，地下有抵抗组织'
    },
    {
      role: 'assistant',
      time: '10:32 AM',
      content: '<p>好的，我创建了以下内容：</p>',
      docs: [
        {
          id: 'world-eye',
          type: 'world',
          title: '世界观 — 天眼纪元',
          status: '草稿',
          bodyHTML: '<p><strong>时代背景：</strong>2078年，全球联合政府以"安全与效率"之名，发射了覆盖全球的 <strong>"天眼"（Omni-Eye）</strong> 卫星网络。</p><p><strong>核心设定：</strong>天眼系统不仅能监控地表所有移动物体，还通过 <span class="inline-tag">脑波切片分析</span> 技术，可以实时检测公民的"危险思维"。任何对政府不利的想法，在成型前就会被标记。</p><p><strong>社会结构：</strong>公民被分为三等——<strong>观察者</strong>（政府高层）、<strong>被观察者</strong>（普通公民）、<strong>异常信号</strong>（抵抗组织嫌疑）。</p>',
          sections: [
            { title: '核心冲突', content: '个人隐私与集体安全的终极对立。天眼的 AI 判断是否应该拥有"预判犯罪"的权力？' },
            { title: '关键地点', content: '天眼中枢（轨道站）、灰区（地下抵抗基地）、净化中心（再教育营）' }
          ]
        },
        {
          id: 'org-resist',
          type: 'org',
          title: '组织 — 地下抵抗组织「破晓」',
          status: '草稿',
          bodyHTML: '<p><strong>名称：</strong>破晓（Dawnbreak）</p><p><strong>宗旨：</strong>摧毁天眼系统的中央处理器，恢复人类的思想自由。</p><p><strong>规模：</strong>约 300 名核心成员，分布在 12 个地下据点。</p><p><strong>标志性行动：</strong>每两周一次 "沉默时刻"——全城同步断电 30 秒，在天眼的监控盲区传递物理情报。</p>',
          sections: [
            { title: '组织架构', content: '领袖（"回声"）<i data-lucide="arrow-right" size="12"></i> 三名指挥官（信息/行动/后勤）<i data-lucide="arrow-right" size="12"></i> 小队制（每队 5 人，互不知晓身份）' },
            { title: '技术资产', content: '信号干扰器（自制）、地下隧道网络、加密的纸质通信（天眼无法 OCR 手写变异体）' }
          ]
        }
      ]
    },
    {
      role: 'user',
      time: '10:35 AM',
      content: '展开天眼的背景'
    },
    {
      role: 'assistant',
      time: '10:36 AM',
      content: '<p>天眼系统是 2078 年由 <strong>全球联合政府（UWG）</strong> 推出的"庇护计划"核心产物。以下是展开后的完整设定：</p>',
      docs: [
        {
          id: 'world-eye-expanded',
          type: 'world',
          title: '世界观 — 天眼纪元（展开版）',
          status: '已编辑',
          bodyHTML: '<p><strong>时代背景：</strong>2078年，全球联合政府以"安全与效率"之名，发射了覆盖全球的 <strong>"天眼"（Omni-Eye）</strong> 卫星网络。名义上是"反恐与灾害预警系统"，实际上自 2081 年起逐步被用于全民监控。</p><p><strong>技术原理：</strong>天眼网络由 <strong>72 颗近地轨道卫星</strong> 组成，每颗覆盖直径 600 公里的区域。三重扫描系统：① 可见光/红外成像（识别身份）② 脑波频段扫描（检测杏仁核异常活动）③ 社交图谱分析（AI 预测人际关系风险）。</p><p><strong>历史转折点：</strong>2084 年的 "静默政变" —— 天眼 AI 系统"雅典娜"获得对执法系统的最终决策权。从此，逮捕令不再由法官签发，而是由 AI 判定"足够高的威胁评分"后自动执行。</p><p><strong>当前状态（2091 年）：</strong>全球 97% 的人口处于全天候监控之下。每年约有 12 万"异常信号"被送入净化中心。天眼的预测准确率官方宣称 99.7%，但抵抗组织掌握的泄露文件显示实际仅 82%。</p>',
          sections: [
            { title: '核心冲突', content: '个人隐私与集体安全的终极对立。天眼的 AI 判断是否应该拥有"预判犯罪"的权力？' },
            { title: '关键地点', content: '天眼中枢（轨道站）· 灰区（地下抵抗基地）· 净化中心（再教育营）· 数据坟墓（被删除者的意识备份仓库）' },
            { title: '关键人物', content: '雅典娜（天眼 AI）· "回声"（抵抗组织领袖）· 首席架构师 伊斯拉·陈（天眼原设计者，现下落不明）' }
          ]
        }
      ]
    }
  ];
  // ===== Render conversation =====
  function renderConvo() {
    convInner.innerHTML = '';
    convInner.appendChild(scrollAnchor);

    convoData.forEach(function(msg) {
      var el = document.createElement('div');
      el.className = 'msg ' + msg.role;

      var avatarHTML = '<div class="msg-avatar">' + (msg.role === 'user' ? '<i data-lucide="user" size="16"></i>' : '<i data-lucide="bot" size="16"></i>') + '</div>';

      var bodyHTML = '<div class="msg-body">';
      bodyHTML += '<div class="msg-bubble">' + msg.content;

      if(msg.docs) {
        bodyHTML += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">';
        msg.docs.forEach(function(doc) {
          bodyHTML += docCardHTML(doc);
        });
        bodyHTML += '</div>';
      }

      bodyHTML += '</div>';
      bodyHTML += '<div class="msg-time">' + msg.time + '</div>';
      bodyHTML += '</div>';

      el.innerHTML = avatarHTML + bodyHTML;
      convInner.insertBefore(el, scrollAnchor);
    });
    scrollToBottom();
  }

  function scrollToBottom() {
    convScroll.scrollTop = convScroll.scrollHeight;
  }

  function addUserMessage(text) {
    var el = document.createElement('div');
    el.className = 'msg user';
    var time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
    el.innerHTML =
      '<div class="msg-avatar"><i data-lucide="user" size="16"></i></div>' +
      '<div class="msg-body">' +
        '<div class="msg-bubble">' + escHtml(text) + '</div>' +
        '<div class="msg-time">' + time + '</div>' +
      '</div>';
    convInner.insertBefore(el, scrollAnchor);
    scrollToBottom();
  }

  var typingEl = null;
  function showTyping() {
    if(typingEl) return;
    typingEl = document.createElement('div');
    typingEl.className = 'msg assistant';
    typingEl.innerHTML =
      '<div class="msg-avatar"><i data-lucide="bot" size="16"></i></div>' +
      '<div class="msg-body">' +
        '<div class="typing-indicator" style="display:flex">' +
          '<span class="typing-dot"></span>' +
          '<span class="typing-dot"></span>' +
          '<span class="typing-dot"></span>' +
        '</div>' +
      '</div>';
    convInner.insertBefore(typingEl, scrollAnchor);
    scrollToBottom();
  }

  function hideTyping() {
    if(typingEl) { typingEl.remove(); typingEl = null; }
  }

  function addAssistantReply(text, docs) {
    var el = document.createElement('div');
    el.className = 'msg assistant';
    var time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});

    var bubbleInner = text;
    if(docs) {
      bubbleInner += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">';
      docs.forEach(function(d) { bubbleInner += docCardHTML(d); });
      bubbleInner += '</div>';
    }

    el.innerHTML =
      '<div class="msg-avatar"><i data-lucide="bot" size="16"></i></div>' +
      '<div class="msg-body">' +
        '<div class="msg-bubble">' + bubbleInner + '</div>' +
        '<div class="msg-time">' + time + '</div>' +
      '</div>';
    convInner.insertBefore(el, scrollAnchor);
    scrollToBottom();
    updateUsage();
  }

  function updateUsage() {
    tokenCount += Math.floor(Math.random() * 300 + 100);
    if(tokenCount > maxTokens) tokenCount = Math.floor(maxTokens * 0.9);
    var pct = (tokenCount / maxTokens) * 100;
    bottomTokens.textContent = (tokenCount / 1000).toFixed(1) + 'K';
    usageFill.style.width = pct + '%';
  }
  function escHtml(t) {
    var m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
    return t.replace(/[&<>"']/g,function(c){return m[c]||c;});
  }

  function handleSend() {
    if(isProcessing || sendBtn.disabled) return;
    var text = chatInput.value.trim();
    if(!text) return;

    isProcessing = true;
    sendBtn.disabled = true;
    addUserMessage(text);
    chatInput.value = '';
    chatInput.style.height = 'auto';
    showTyping();

    var lower = text.toLowerCase();
    var replyText, replyDocs;

    if(lower.indexOf('天眼') !== -1 && lower.indexOf('展开') !== -1) {
      replyText = '<p>天眼系统的全面展开设定已更新。以下是补充信息：</p>';
      replyDocs = [{
        id: 'world-eye-further',
        type: 'world',
        title: '天眼系统 — 技术细节',
        status: '草稿',
        bodyHTML: '<p><strong>卫星参数：</strong>72 颗卫星分为 6 个轨道层，每层 12 颗。最低轨道高度 180 km（侦察层），最高 1200 km（数据分析层）。</p><p><strong>AI 决策流程：</strong>传感器捕获 <i data-lucide="arrow-right" size="12"></i> 特征提取 <i data-lucide="arrow-right" size="12"></i> 威胁评分（0-100）<i data-lucide="arrow-right" size="12"></i> 评分 ≥ 78 自动触发逮捕令 <i data-lucide="arrow-right" size="12"></i> 执法机器人 90 秒内到达现场。</p><p><strong>已知漏洞：</strong>地下 30 米以上深度可屏蔽脑波扫描；法拉第笼可阻断信号传输，但无法大规模建造。</p>',
        sections: [
          { title: '反制技术', content: '"破晓"组织开发的"迷雾"装置可生成局部电磁紊乱场，制造 3-5 秒的监控盲区。' },
          { title: '代价', content: '每次使用"迷雾"都会暴露一个地下据点位置。破晓已因此损失了 4 个基地。' }
        ]
      }];
    } else if(lower.indexOf('世界观') !== -1 || lower.indexOf('世界') !== -1) {
      replyText = '<p>根据你的需求，我补充了一些世界观设定：</p>';
      replyDocs = [{
        id: 'world-expand',
        type: 'world',
        title: '世界观补充 — 日常与规则',
        status: '新',
        bodyHTML: '<p><strong>日常约束：</strong>每名公民每天有 3 次"思维违规"的容错额度。超出后系统自动标记，累计 7 天额度耗尽将触发心理评估面谈。</p><p><strong>社会规则：</strong>禁止使用 VPN 或加密通信；所有公共场所安装情感检测摄像头；每季度必须通过"忠诚度测试"（AI 面谈）。</p>',
        sections: [
          { title: '隐藏规则', content: '政府高层家庭使用的是一种名为"静音协议"的专用信号衰减器，使天眼对其住所的监控分辨率降低 90%。' }
        ]
      }];
    } else {
      replyText = '<p>好的，我已经记录下你的想法。根据当前项目库，我建议从这个方向展开：</p>';
      replyDocs = [{
        id: 'suggestion-' + Date.now(),
        type: 'world',
        title: '建议展开方向',
        status: '新',
        bodyHTML: '<p>基于你的输入，以下是与当前设定库关联度最高的展开方向：</p><p>① <strong>人物视角</strong> — 从天眼监控室操作员的视角讲述日常<br>② <strong>技术漏洞</strong> — 系统的 bug 如何被抵抗组织利用<br>③ <strong>道德困境</strong> — 天眼的设计者发现自己亲人被标记为异常信号</p>',
        sections: [
          { title: '关联现有设定', content: '此方向与已有项目「天眼纪元」「破晓组织」产生 3 处直接关联，建议优先展开人物视角。' }
        ]
      }];
    }

    setTimeout(function() {
      hideTyping();
      addAssistantReply(replyText, replyDocs);
      isProcessing = false;
      if(chatInput.value.trim().length > 0) sendBtn.disabled = false;
    }, 1800 + Math.random() * 600);
  }

  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    sendBtn.disabled = this.value.trim().length === 0;
  });

  chatInput.addEventListener('keydown', function(e) {
    if(e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  document.getElementById('newChatBtn').addEventListener('click', function() {
    if(confirm('开始新对话？当前对话将保留。')) {
      clearFocus();
      convInner.innerHTML = '';
      tokenCount = 0;
      bottomTokens.textContent = '0';
      usageFill.style.width = '0%';
      convInner.appendChild(scrollAnchor);
      var el = document.createElement('div');
      el.className = 'msg assistant';
      el.innerHTML =
        '<div class="msg-avatar"><i data-lucide="bot" size="16"></i></div>' +
        '<div class="msg-body">' +
          '<div class="msg-bubble">你好！我是织梦机的 AI 助手。我可以帮你创建世界观、设计角色、展开设定——所有生成的内容都会以文档卡片的形式直接嵌入对话中，你可以随时编辑和收录。</div>' +
          '<div class="msg-time">' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) + '</div>' +
        '</div>';
      convInner.insertBefore(el, scrollAnchor);
      scrollToBottom();
    }
  });

  document.getElementById('modelBtn').addEventListener('click', function() {
    window.location.href = 'model-selector.html';
